# feature — config file.
#
# Copy to ~/.config/feature/config.toml (or point $FEATURE_CONFIG at it) and
# edit. Anything you omit falls back to the built-in defaults shown below.

# Account whose issues are listed and who new issues are assigned to.
assignee = "itayka@dreamgroup.com"

# The jira CLI executable (a full path works too).
jira_bin = "jira"

[list]
# Issues in these statuses / of these types are hidden from the picker.
exclude_statuses = ["Done", "Archived"]
exclude_types = ["Epic"]

[create]
# Status a freshly created issue is moved to (best-effort).
move_to = "In Progress"

[create.custom]
# Extra fields set on create, passed as `--custom key=value`.
squad = "Detection"

[aliases]
# Query-prefix -> issue type. Type "<prefix> some text" in the picker to filter
# to that type (and to pre-pick the type for ctrl-n create).
b = "Bug"
bug = "Bug"
t = "Task"
task = "Task"
s = "Story"
story = "Story"
st = "Sub-task"
sub = "Sub-task"
subtask = "Sub-task"
