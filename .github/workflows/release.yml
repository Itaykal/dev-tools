name: release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write          # needed to create the GitHub Release

jobs:
  release:
    runs-on: macos-14      # Apple Silicon → aarch64-apple-darwin
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: tools

      - name: Build release binaries
        working-directory: tools
        run: cargo build --release --locked

      - name: Package
        working-directory: tools/target/release
        run: |
          tar -czf "$GITHUB_WORKSPACE/kalfon-dotfiles-tools-aarch64-apple-darwin.tar.gz" \
            aws-switch feature

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: kalfon-dotfiles-tools-aarch64-apple-darwin.tar.gz
          generate_release_notes: true
