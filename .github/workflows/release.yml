name: release

# Per-tool releases. Tag a tool as `<tool>-v<version>` (e.g. `feature-v0.1.0`,
# `aws-switch-v0.2.0`) and this builds just that crate and publishes a release
# for that tag. New tools need no workflow changes — the tool name is derived
# from the tag and validated against tools/crates/<tool>.
on:
  push:
    tags:
      - '*-v*'

permissions:
  contents: write          # needed to create the GitHub Release

jobs:
  release:
    runs-on: macos-14      # Apple Silicon → aarch64-apple-darwin
    steps:
      - uses: actions/checkout@v4

      - name: Resolve tool from tag
        id: tool
        run: |
          tool="${GITHUB_REF_NAME%-v*}"
          manifest="tools/crates/$tool/Cargo.toml"
          if [ ! -f "$manifest" ] || ! grep -q '^\[\[bin\]\]' "$manifest"; then
            echo "::error::tag '$GITHUB_REF_NAME' does not map to a binary crate (expected $manifest with a [[bin]])"
            exit 1
          fi
          echo "name=$tool" >> "$GITHUB_OUTPUT"

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: tools

      - name: Build release binary
        working-directory: tools
        run: cargo build --release --locked -p "${{ steps.tool.outputs.name }}"

      - name: Package
        working-directory: tools/target/release
        run: |
          tar -czf "$GITHUB_WORKSPACE/${{ steps.tool.outputs.name }}-aarch64-apple-darwin.tar.gz" \
            "${{ steps.tool.outputs.name }}"

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.tool.outputs.name }}-aarch64-apple-darwin.tar.gz
          generate_release_notes: true
